---
name: "Release"
on:
  workflow_call:
    inputs:
      publish:
        description: "Publish the release after all jobs complete. When false, the release remains a draft."
        required: false
        type: boolean
        default: true
      release-config-name:
        required: true
        type: string
      update-major-tag:
        required: false
        type: boolean
        default: true
      image-name:
        description: "Docker image name (e.g., owner/repo). Enables image build/push when set."
        required: false
        type: string
        default: ""
      create-attestation:
        description: "Create build provenance attestation for artifacts and/or Docker images."
        required: false
        type: boolean
        default: false
      image-registry:
        description: "Container registry URL."
        required: false
        type: string
        default: "ghcr.io"
      image-registry-username:
        description: "Container registry username."
        required: false
        type: string
        default: ""
      image-platforms:
        description: "Comma-separated list of target platforms for Docker build."
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      goreleaser-config-path:
        description: "Path to GoReleaser config file. Enables GoReleaser build/upload when set."
        required: false
        type: string
        default: ""
    secrets:
      github-token:
        required: true
      image-registry-password:
        required: false
      discussion-category-id:
        required: false
      discussion-repository-id:
        required: false
    outputs:
      full-tag:
        description: "Full tag of release"
        value: ${{ jobs.create_release.outputs.full-tag }}
      short-tag:
        description: "Short tag of release"
        value: ${{ jobs.create_release.outputs.short-tag }}
      body:
        description: "Body content of release"
        value: ${{ jobs.create_release.outputs.body }}

permissions: {}

jobs:
  create_release:
    # Release if:
    # - Manual deployment (workflow_dispatch), OR
    # - PR was merged with a breaking, feature, vuln, or release label
    # Note: major/minor/patch labels alone do NOT trigger a release
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       (contains(github.event.pull_request.labels.*.name, 'breaking') ||
        contains(github.event.pull_request.labels.*.name, 'feature') ||
        contains(github.event.pull_request.labels.*.name, 'vuln') ||
        contains(github.event.pull_request.labels.*.name, 'release')))
    outputs:
      full-tag: ${{ steps.release-drafter.outputs.tag_name }}
      short-tag: ${{ steps.get_tag_name.outputs.SHORT_TAG }}
      body: ${{ steps.release-drafter.outputs.body }}
      release-id: ${{ steps.release-drafter.outputs.id }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # Create draft release via release-drafter
      pull-requests: read # Read PR labels for release-drafter
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
      - name: Draft release
        id: release-drafter
        uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
        with:
          config-name: ${{ inputs.release-config-name }}
          publish: false
          token: ${{ secrets.github-token }}
      - name: Get the Short Tag
        id: get_tag_name
        run: |
          short_tag=$(echo "${{ steps.release-drafter.outputs.tag_name }}" | cut -d. -f1)
          echo "SHORT_TAG=$short_tag" >> "$GITHUB_OUTPUT"

  update_major_tag:
    needs: create_release
    if: ${{ inputs.update-major-tag && needs.create_release.outputs.full-tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # Force-push major version tag
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.create_release.outputs.full-tag }}
          persist-credentials: true # Required for git push

      - name: Force update major tag
        run: |
          git tag -f "${SHORT}" "${FULL}"
          git push -f origin "${SHORT}"
        env:
          SHORT: ${{ needs.create_release.outputs.short-tag }}
          FULL: ${{ needs.create_release.outputs.full-tag }}

  release_goreleaser:
    needs: create_release
    if: ${{ inputs.goreleaser-config-path != '' && needs.create_release.outputs.full-tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # Upload release assets and push tags
      id-token: write # Federate for artifact attestation
      attestations: write # Generate artifact attestations
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true # Required for git push of tags

      - name: Create and push tag
        run: |
          git tag "${{ needs.create_release.outputs.full-tag }}"
          git push origin "${{ needs.create_release.outputs.full-tag }}"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build with GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config ${{ inputs.goreleaser-config-path }}
        env:
          GORELEASER_CURRENT_TAG: ${{ needs.create_release.outputs.full-tag }}

      - name: Upload artifacts to draft release
        run: |
          gh release upload "${{ needs.create_release.outputs.full-tag }}" \
            dist/*.tar.gz \
            dist/*.zip \
            dist/checksums.txt \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.github-token }}

      - name: Check repository visibility
        id: repo-visibility
        run: |
          visibility=$(gh api "repos/${{ github.repository }}" --jq '.visibility')
          echo "is_public=$( [ "$visibility" = "public" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.github-token }}

      - name: Generate artifact attestation
        if: ${{ inputs.create-attestation && steps.repo-visibility.outputs.is_public == 'true' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

      - name: Skip attestation notice
        if: ${{ inputs.create-attestation && steps.repo-visibility.outputs.is_public != 'true' }}
        run: |
          echo "::warning::Artifact attestation skipped — not available for private user-owned repositories. Make this repository public to enable attestation."

  release_image:
    needs: create_release
    if: ${{ inputs.image-name != '' && needs.create_release.outputs.full-tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # Clone the repository
      packages: write # Push container images
      id-token: write # Federate via Workload Identity for attestation
      attestations: write # Create build provenance attestation
    env:
      IMAGE_REGISTRY: ${{ inputs.image-registry }}
      IMAGE_REGISTRY_USERNAME: ${{ inputs.image-registry-username || github.actor }}
      IMAGE_REGISTRY_PASSWORD: ${{ secrets.image-registry-password }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Validate image registry password
        if: ${{ env.IMAGE_REGISTRY_PASSWORD == '' }}
        run: |
          echo "::error::image-registry-password secret is required when image-name is set"
          exit 1

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.IMAGE_REGISTRY_USERNAME }}
          password: ${{ env.IMAGE_REGISTRY_PASSWORD }}

      - name: Push Docker Image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        id: push
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ inputs.image-name }}:latest
            ${{ env.IMAGE_REGISTRY }}/${{ inputs.image-name }}:${{ needs.create_release.outputs.full-tag }}
            ${{ env.IMAGE_REGISTRY }}/${{ inputs.image-name }}:${{ needs.create_release.outputs.short-tag }}
          platforms: ${{ inputs.image-platforms }}
          provenance: false
          sbom: false

      - name: Check repository visibility
        if: ${{ inputs.create-attestation }}
        id: repo-visibility
        run: |
          visibility=$(gh api "repos/${{ github.repository }}" --jq '.visibility')
          echo "is_public=$( [ "$visibility" = "public" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.github-token }}

      - name: Generate artifact attestation
        if: ${{ inputs.create-attestation && steps.repo-visibility.outputs.is_public == 'true' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ inputs.image-name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          github-token: ${{ secrets.github-token }}

      - name: Skip attestation notice
        if: ${{ inputs.create-attestation && steps.repo-visibility.outputs.is_public != 'true' }}
        run: |
          echo "::warning::Artifact attestation skipped — not available for private user-owned repositories. Make this repository public to enable attestation."

  release_discussion:
    needs: create_release
    if: ${{ needs.create_release.outputs.full-tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required by harden-runner
      discussions: write # Create announcement discussions
    env:
      DISCUSSION_REPOSITORY_ID: ${{ secrets.discussion-repository-id }}
      DISCUSSION_CATEGORY_ID: ${{ secrets.discussion-category-id }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Validate discussion repository ID
        if: ${{ env.DISCUSSION_REPOSITORY_ID == '' }}
        run: |
          echo "::notice::discussion-repository-id secret is not set, skipping discussion creation"
          exit 0

      - name: Validate discussion category ID
        if: ${{ env.DISCUSSION_CATEGORY_ID == '' }}
        run: |
          echo "::notice::discussion-category-id secret is not set, skipping discussion creation"
          exit 0

      - name: Create an Announcement Discussion for Release
        if: ${{ env.DISCUSSION_REPOSITORY_ID != '' && env.DISCUSSION_CATEGORY_ID != '' }}
        uses: abirismyname/create-discussion@c2b7c825241769dda523865ae444a879f6bbd0e0
        with:
          title: ${{ needs.create_release.outputs.full-tag }}
          body: ${{ needs.create_release.outputs.body }}
          repository-id: ${{ env.DISCUSSION_REPOSITORY_ID }}
          category-id: ${{ env.DISCUSSION_CATEGORY_ID }}
          github-token: ${{ secrets.github-token }}

  publish_release:
    needs: [create_release, update_major_tag, release_goreleaser, release_image, release_discussion]
    if: >
      always() &&
      inputs.publish &&
      needs.create_release.result == 'success' &&
      (needs.update_major_tag.result == 'success' || needs.update_major_tag.result == 'skipped') &&
      (needs.release_goreleaser.result == 'success' || needs.release_goreleaser.result == 'skipped') &&
      (needs.release_image.result == 'success' || needs.release_image.result == 'skipped') &&
      (needs.release_discussion.result == 'success' || needs.release_discussion.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Publish draft release
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Publish draft release
        run: |
          gh api \
            --method PATCH \
            "/repos/${{ github.repository }}/releases/${{ needs.create_release.outputs.release-id }}" \
            -f draft=false
        env:
          GH_TOKEN: ${{ secrets.github-token }}
